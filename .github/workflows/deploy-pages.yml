name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_SCORES_API: https://vernan-scores.henrysbasu.workers.dev
          VITE_AUTH_API: https://vernan-auth.henrysbasu.workers.dev
        run: |
          COUNT=$(git rev-list --count HEAD)
          export VITE_VERNAN_VERSION="0.1.${COUNT}"
          echo "VITE_VERNAN_VERSION=${VITE_VERNAN_VERSION}"
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
