<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vernan — Leaderboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --ink: #d7dde5;
        --muted: #7d8a98;
        --faint: #5a6570;
        --accent: #6ec8ff;
        --rung-gap: #050608;
        --font: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        --ladder-shaft: url("./assets/ui/ladder-shaft-tile.png");
        --ladder-rung: url("./assets/ui/ladder-rung-single.png");
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
      }

      body {
        min-height: 100%;
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr);
        justify-items: center;
        align-content: start;
        padding: 24px 16px 16px;
        gap: 16px;
        background:
          radial-gradient(ellipse 80% 50% at 50% 0%, rgba(110, 200, 255, 0.06), transparent 55%),
          var(--bg);
      }

      h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #9aa7b5;
        text-align: center;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .title-icon {
        width: 48px;
        height: 48px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        flex-shrink: 0;
      }

      .nav-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .nav-btn {
        display: inline-block;
        padding: 0.5rem 0.85rem;
        border: 1px solid rgba(110, 200, 255, 0.45);
        background: rgba(110, 200, 255, 0.12);
        color: var(--accent);
        font-family: var(--font);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-decoration: none;
        text-transform: uppercase;
        transition: background 0.15s ease, border-color 0.15s ease;
      }

      .nav-btn:hover {
        background: rgba(110, 200, 255, 0.22);
        border-color: var(--accent);
      }

      .nav-btn[aria-current="page"] {
        background: rgba(110, 200, 255, 0.22);
        border-color: var(--accent);
        color: #d7eefc;
      }

      .nav-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .meta {
        margin: 0;
        max-width: 36rem;
        font-size: 0.75rem;
        line-height: 1.45;
        color: var(--muted);
        text-align: center;
      }

      /* Climbing shaft: rails + sparse rungs; scores sit in the gaps. */
      .ladder {
        width: min(40rem, 100%);
        margin-top: 8px;
        list-style: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        scrollbar-color: rgba(110, 200, 255, 0.45) rgba(5, 6, 8, 0.8);
        image-rendering: pixelated;
        box-shadow: 0 0 0 1px rgba(110, 200, 255, 0.12);
        animation: climb-in 0.5s ease-out both;
      }

      .ladder::-webkit-scrollbar {
        width: 8px;
      }

      .ladder::-webkit-scrollbar-thumb {
        background: rgba(110, 200, 255, 0.35);
        border-radius: 4px;
      }

      .ladder::-webkit-scrollbar-track {
        background: rgba(5, 6, 8, 0.85);
      }

      .ladder-cap {
        height: 14px;
        background-image: var(--ladder-shaft), var(--ladder-shaft);
        background-size: 40px 40px, 40px 40px;
        background-repeat: repeat-y, repeat-y;
        background-position: left center, right center;
        background-color: var(--rung-gap);
        position: relative;
      }

      .ladder-cap::after {
        content: "";
        position: absolute;
        left: 40px;
        right: 40px;
        top: 50%;
        height: 8px;
        margin-top: -4px;
        background: var(--ladder-rung) center / auto 100% repeat-x;
        image-rendering: pixelated;
      }

      .ladder-bay {
        display: grid;
        grid-template-columns: 40px 1fr 40px;
        min-height: 0;
        background: var(--rung-gap);
      }

      .rail {
        background: var(--ladder-shaft) center top / 40px 40px repeat-y;
        image-rendering: pixelated;
      }

      .score {
        display: grid;
        grid-template-columns: 2.2rem minmax(0, 1fr) auto;
        grid-template-areas:
          "rank main costume"
          "rank time costume";
        gap: 0.1rem 0.75rem;
        align-items: center;
        padding: 0.4rem 0.75rem;
        animation: bay-in 0.4s ease-out both;
      }

      .rank {
        grid-area: rank;
        font-weight: 700;
        color: var(--faint);
        font-size: 0.95rem;
      }

      .score-main {
        grid-area: main;
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem 1rem;
        align-items: baseline;
      }

      .time {
        grid-area: time;
        font-size: 0.68rem;
        color: var(--faint);
      }

      .costume {
        grid-area: costume;
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
      }

      .costume-icon {
        width: 40px;
        height: 40px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .place-1 .rank {
        color: #d4b56a;
      }
      .place-2 .rank {
        color: #b8c4d4;
      }
      .place-3 .rank {
        color: #c4895a;
      }

      /* Top 10 get a slightly larger bay / type / costume. */
      .ladder-bay.top-ten .score {
        padding: 0.55rem 0.85rem;
        gap: 0.15rem 0.85rem;
      }

      .ladder-bay.top-ten .rank {
        font-size: 1.12rem;
      }

      .ladder-bay.top-ten .player {
        font-size: 1.05rem;
      }

      .ladder-bay.top-ten .stat {
        font-size: 0.86rem;
      }

      .ladder-bay.top-ten .time {
        font-size: 0.74rem;
      }

      .ladder-bay.top-ten .costume,
      .ladder-bay.top-ten .costume-icon {
        width: 52px;
        height: 52px;
      }

      .player {
        color: var(--ink);
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .stat {
        color: var(--muted);
        font-size: 0.78rem;
        font-variant-numeric: tabular-nums;
      }

      .stat strong {
        color: var(--ink);
        font-weight: 500;
      }

      .stat.client {
        color: var(--accent);
        font-variant-numeric: normal;
        letter-spacing: 0.02em;
      }

      .seed a {
        color: var(--accent);
        text-decoration: none;
      }

      .seed a:hover {
        text-decoration: underline;
      }

      /* One thin rung between players (not the double-bar tile). */
      .ladder-rung {
        height: 8px;
        display: grid;
        grid-template-columns: 40px 1fr 40px;
        background: var(--rung-gap);
      }

      .ladder-rung .rail {
        background: var(--ladder-shaft) center / 40px 40px repeat-y;
      }

      .ladder-rung .bar {
        background: var(--ladder-rung) center / auto 100% repeat-x;
        image-rendering: pixelated;
      }

      .empty,
      .error {
        padding: 1.25rem 1rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.5;
        grid-column: 1 / -1;
      }

      .error {
        color: #f0a0a0;
      }

      .ladder.ladder-error {
        overflow: hidden;
        box-shadow: none;
      }

      .connection-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        min-height: 12rem;
        padding: 2rem 1.25rem;
        text-align: center;
        background: var(--rung-gap);
        border: 1px solid rgba(110, 200, 255, 0.18);
      }

      .connection-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #f0a0a0;
      }

      .connection-body {
        margin: 0;
        max-width: 22rem;
        font-size: 0.85rem;
        line-height: 1.5;
        color: var(--muted);
      }

      .connection-return {
        margin-top: 0.5rem;
      }

      .connection-error-actions {
        display: flex;
        justify-content: center;
        padding: 1rem 0 0.5rem;
      }

      @keyframes climb-in {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes bay-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @media (max-width: 520px) {
        .score {
          grid-template-columns: 1.8rem minmax(0, 1fr) auto;
          gap: 0.1rem 0.45rem;
          padding: 0.35rem 0.5rem;
        }

        .stat {
          font-size: 0.72rem;
        }

        .costume,
        .costume-icon {
          width: 32px;
          height: 32px;
        }

        .ladder-bay.top-ten .score {
          padding: 0.45rem 0.55rem;
        }

        .ladder-bay.top-ten .costume,
        .ladder-bay.top-ten .costume-icon {
          width: 40px;
          height: 40px;
        }

        .ladder-bay,
        .ladder-rung {
          grid-template-columns: 28px 1fr 28px;
        }

        .rail,
        .ladder-rung .rail,
        .ladder-cap {
          background-size: 28px 28px;
        }

        .ladder-cap {
          background-size: 28px 28px, 28px 28px;
        }

        .ladder-cap::after {
          left: 28px;
          right: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="title-row">
      <img
        class="title-icon"
        src="./assets/sprites/vernan idle.png"
        width="48"
        height="48"
        alt=""
        aria-hidden="true"
      />
      <h1>Vernan</h1>
    </div>
    <nav class="nav-row" aria-label="Site">
      <a class="nav-btn" href="./index.html">Play</a>
    </nav>
    <p class="meta" id="board-meta">Loading rankings…</p>

    <div class="ladder" id="leaderboard-ladder" role="list" aria-label="Rankings">
      <div class="empty">Loading…</div>
    </div>

    <script type="module" src="/src/leaderboard/main.ts"></script>
  </body>
</html>
