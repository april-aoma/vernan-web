<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vernan — Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #07090c;
        --bg-1: #10161f;
        --ink: #e6edf5;
        --muted: #8b9aab;
        --faint: #5d6b7c;
        --line: rgba(140, 170, 200, 0.14);
        --accent: #5ec4ff;
        --accent-dim: rgba(94, 196, 255, 0.14);
        --gold: #d4b56a;
        --silver: #b8c4d4;
        --bronze: #c4895a;
        --danger: #ff8f8f;
        --font-display: "Chakra Petch", sans-serif;
        --font-mono: "IBM Plex Mono", ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: var(--font-mono);
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at 50% -10%, rgba(94, 196, 255, 0.1), transparent 55%),
          radial-gradient(900px 500px at 100% 100%, rgba(40, 70, 90, 0.35), transparent 50%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
        background-attachment: fixed;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.35;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
      }

      .shell {
        position: relative;
        width: min(58rem, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2.5rem 0 4rem;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 2rem;
        animation: rise 0.55s ease-out both;
      }

      .brand-block {
        min-width: 0;
      }

      .brand {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(2.4rem, 7vw, 3.75rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        line-height: 0.95;
        text-transform: uppercase;
        color: var(--ink);
      }

      .brand span {
        display: block;
        margin-top: 0.35rem;
        font-size: 0.42em;
        font-weight: 500;
        letter-spacing: 0.28em;
        color: var(--accent);
      }

      .play-link {
        flex-shrink: 0;
        margin-top: 0.35rem;
        padding: 0.55rem 0.9rem;
        border: 1px solid rgba(94, 196, 255, 0.45);
        background: var(--accent-dim);
        color: var(--accent);
        font-family: var(--font-display);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-decoration: none;
        text-transform: uppercase;
        transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      }

      .play-link:hover {
        background: rgba(94, 196, 255, 0.22);
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .play-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .meta {
        margin: 0 0 1.5rem;
        max-width: 40rem;
        font-size: 0.78rem;
        line-height: 1.55;
        color: var(--muted);
        animation: rise 0.55s ease-out 0.08s both;
      }

      .board {
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        animation: rise 0.6s ease-out 0.14s both;
      }

      .board-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }

      thead th {
        padding: 0.85rem 0.75rem;
        border-bottom: 1px solid var(--line);
        font-family: var(--font-display);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-align: left;
        color: var(--faint);
        white-space: nowrap;
      }

      tbody tr {
        transition: background 0.15s ease;
      }

      tbody tr:hover {
        background: rgba(94, 196, 255, 0.05);
      }

      tbody td {
        padding: 0.95rem 0.75rem;
        border-bottom: 1px solid rgba(140, 170, 200, 0.08);
        color: var(--muted);
        white-space: nowrap;
        vertical-align: middle;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      .rank {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.04em;
        color: var(--faint);
        width: 3rem;
      }

      tr.place-1 .rank {
        color: var(--gold);
      }
      tr.place-2 .rank {
        color: var(--silver);
      }
      tr.place-3 .rank {
        color: var(--bronze);
      }

      tr.place-1 td:first-child,
      tr.place-2 td:first-child,
      tr.place-3 td:first-child {
        box-shadow: inset 3px 0 0 currentColor;
      }

      tr.place-1 td:first-child {
        color: var(--gold);
      }
      tr.place-2 td:first-child {
        color: var(--silver);
      }
      tr.place-3 td:first-child {
        color: var(--bronze);
      }

      .player {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        color: var(--ink);
      }

      .num {
        font-variant-numeric: tabular-nums;
        color: var(--ink);
      }

      .seed a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.15s ease, color 0.15s ease;
      }

      .seed a:hover {
        border-bottom-color: var(--accent);
      }

      .time {
        font-size: 0.75rem;
        color: var(--faint);
      }

      .empty,
      .error {
        padding: 2.5rem 1rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.5;
      }

      .error {
        color: var(--danger);
      }

      .row-enter {
        animation: rowIn 0.45s ease-out both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes rowIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @media (max-width: 640px) {
        .shell {
          width: calc(100% - 1.25rem);
          padding-top: 1.5rem;
        }

        .brand {
          letter-spacing: 0.06em;
        }

        .topbar {
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand-block">
          <h1 class="brand">Vernan<span>Leaderboard</span></h1>
        </div>
        <a class="play-link" href="./index.html">Play</a>
      </header>

      <p class="meta" id="board-meta">Loading rankings…</p>

      <section class="board" aria-label="Rankings">
        <div class="board-scroll">
          <table>
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Player</th>
                <th scope="col">Floor</th>
                <th scope="col">Coins</th>
                <th scope="col">Kills</th>
                <th scope="col">Seed</th>
                <th scope="col">Submitted (UTC)</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              <tr>
                <td colspan="7" class="empty">Loading…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
    <script type="module" src="/src/leaderboard/main.ts"></script>
  </body>
</html>
